name: Governance Check

on:
  pull_request:
    paths:
      - 'packages/**'
      - '.changeset/**'

permissions:
  contents: read

jobs:
  changeset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Require a changeset for governed changes
        run: npx --yes @changesets/cli@^2 status --since=origin/${{ github.base_ref }}
